name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 代码质量检查 ──
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install flake8

      - run: flake8 main.py --max-line-length=100

  # ── 运行测试 ──
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt -r test-requirements.txt

      - run: pytest tests/ -v

  # ── 构建并推送 Docker 镜像 ──
  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: 登录 Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u respectceg --password-stdin

      - name: 构建并推送镜像
        run: |
          docker build -t respectceg/todo-app:latest .
          docker push respectceg/todo-app:latest